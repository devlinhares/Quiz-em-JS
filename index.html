<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>




    <h1>Teste seus Conhecimentos</h1>

<div id="quiz"></div>


<!-- Template usado para repetir perguntas dinamicamente com JavaScript -->
<template>
  <!-- Bloco principal de cada pergunta -->
  <div class="quiz-item">
    <h3>
      Pergunta 01
    </h3>
    <!-- Lista de alternativas -->
    <dl>
      <!-- Alternativa individual -->
      <dt>
        <!-- Botão de seleção (resposta única) -->
        <input type="radio" name="item" value="0">
        <!-- Texto exibido ao lado da opção -->
        <span>
          Resposta A
        </span>
      </dt>
    </dl>
  </div>
</template>

<div id="acertos">
  <strong>Acertos</strong>
  <span> 0 de 10</span>

</div>



    <script src="./script.js"></script>    
</body>
</html>
