<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<main>
  <header>
    <h1>Teste seus Conhecimentos</h1>
  </header>

  <!-- Container onde o JS vai inserir as perguntas dinamicamente -->
  <div id="quiz"></div>

  <!-- Template: molde que o JS clona para cada pergunta -->
  <template>
    <div class="quiz-item">
      <h3>
        Pergunta 01 <!-- Será substituído pelo texto da pergunta -->
      </h3>
      <dl>
        <dt>
          <!-- Radio: value será o índice da resposta (0,1,2...) -->
          <input type="radio" name="item" value="0">
          <span>
            Resposta A <!-- Será substituído pelo texto da alternativa -->
          </span>
        </dt>
      </dl>
    </div>
  </template>

  <!-- Placar fixo na parte inferior -->
  <div id="acertos">
    <strong>Acertos</strong>
    <span>0 de 10</span> <!-- JS atualiza este número -->
  </div>
</main>
    <script src="./script.js"></script>    
</body>
</html>
